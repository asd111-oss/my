<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ИИ в ПТО — Интерактивный курс</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#0D1B2A;--navy2:#132338;--navy3:#1B3252;
  --blue:#2563A8;--blue2:#3B82C4;
  --amber:#E8720C;--amber2:#F59338;
  --silver:#8BA4BE;--mist:#C8D8E8;--fog:#E8EEF5;
  --card:#fff;--border:#D0DDE8;
  --text:#0D1B2A;--sub:#3A5270;--hint:#6B8BAA;
  --green:#1A7F4B;--red:#C0392B;
  --teacher:#7B3FA0;--teacher2:#9B5FC0;
  --r:8px;--r2:12px;--r3:16px;
  font-family:'IBM Plex Sans',sans-serif;
}
html,body,#root{height:100%;background:var(--fog)}
body{overflow:hidden}
#root{display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--mist);border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{opacity:0;transform:scale(.5)}70%{transform:scale(1.06)}100%{opacity:1;transform:scale(1)}}
@keyframes fall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(120px) rotate(700deg);opacity:0}}
.fade{animation:fadeIn .25s ease both}
/* Layout */
.bar{background:var(--navy);height:52px;display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;border-bottom:2px solid var(--amber);z-index:100;position:relative}
.bar.t{border-bottom-color:var(--teacher)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:20px;color:#fff;letter-spacing:2px;white-space:nowrap}
.logo span{color:var(--amber)}
.logo.t span{color:var(--teacher2)}
.vsep{width:1px;height:20px;background:rgba(255,255,255,.12);flex-shrink:0}
.tabs{display:flex;gap:2px;flex:1;overflow-x:auto;padding:2px 0}
.tab{padding:5px 12px;border-radius:6px;border:none;background:transparent;color:var(--silver);cursor:pointer;font-size:12.5px;font-weight:500;white-space:nowrap;transition:all .13s;font-family:inherit}
.tab:hover{background:rgba(255,255,255,.08);color:#fff}
.tab.on{background:var(--amber);color:var(--navy);font-weight:700}
.tab.on.t{background:var(--teacher);color:#fff}
.tab.off{opacity:.35;cursor:not-allowed}
.rbar{display:flex;gap:6px;align-items:center;flex-shrink:0}
.ibtn{width:32px;height:32px;border-radius:6px;border:none;background:rgba(255,255,255,.08);color:var(--silver);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .13s}
.ibtn:hover{background:rgba(255,255,255,.16);color:#fff}
.pill{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.08);border-radius:20px;padding:3px 10px;font-size:11.5px;color:var(--silver)}
.dot{width:6px;height:6px;border-radius:50%}
/* Main layout */
.main{display:flex;flex:1;overflow:hidden}
.side{width:248px;flex-shrink:0;background:var(--navy2);overflow-y:auto;padding:10px 9px;border-right:1px solid rgba(255,255,255,.05)}
.side.t{border-right-color:rgba(123,63,160,.25)}
.content{flex:1;overflow-y:auto;padding:22px 26px}
/* Sidebar */
.slbl{font-size:9.5px;font-weight:700;letter-spacing:1.6px;color:var(--silver);text-transform:uppercase;padding:5px 8px 3px}
.sitem{display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:7px;cursor:pointer;transition:all .13s;color:var(--mist);font-size:12.5px;font-weight:400;border:none;background:none;width:100%;text-align:left}
.sitem:hover{background:rgba(255,255,255,.06);color:#fff}
.sitem.on{background:rgba(232,114,12,.16);color:#F59338;font-weight:600}
.sitem.ton{background:rgba(123,63,160,.2);color:var(--teacher2);font-weight:600}
.sitem.lk{opacity:.35;cursor:not-allowed}
.sitem.lk:hover{background:none!important;color:var(--silver)!important}
.ssep{height:1px;background:rgba(255,255,255,.05);margin:5px 0}
/* Progress bar */
.pbar{height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;margin-top:5px}
.pfill{height:100%;border-radius:3px;transition:width .5s;background:linear-gradient(90deg,var(--blue),var(--amber))}
.pfill.t{background:linear-gradient(90deg,var(--teacher),var(--teacher2))}
/* Cards */
.card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:22px;margin-bottom:14px}
.card.fog{background:var(--fog)}
/* Module hero */
.hero{background:linear-gradient(135deg,var(--navy),var(--navy3));border-radius:14px;padding:26px;margin-bottom:16px;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.07)}
.hero::before{content:'';position:absolute;right:-30px;top:-30px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(232,114,12,.18) 0%,transparent 70%)}
.hbgn{position:absolute;right:22px;bottom:-6px;font-family:'Bebas Neue',sans-serif;font-size:76px;color:rgba(255,255,255,.06);line-height:1;letter-spacing:3px}
.htag{display:inline-flex;align-items:center;gap:5px;background:var(--amber);color:var(--navy);border-radius:4px;font-size:10px;font-weight:800;padding:2px 8px;letter-spacing:.5px;margin-bottom:7px;margin-right:5px}
.htag.done{background:var(--green);color:#fff}
.htag.lock{background:rgba(107,139,170,.4);color:var(--mist)}
.htag.tt{background:var(--teacher);color:#fff}
/* Module tabs */
.mtabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.mtab{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:var(--sub);font-size:12.5px;font-weight:500;cursor:pointer;transition:all .13s;font-family:inherit}
.mtab:hover{border-color:var(--blue2);color:var(--blue)}
.mtab.on{background:var(--navy);border-color:var(--navy);color:#F59338;font-weight:700}
/* Timeline */
.tl{position:relative;padding-left:20px}
.tl::before{content:'';position:absolute;left:6px;top:5px;bottom:5px;width:2px;background:linear-gradient(to bottom,var(--amber),var(--blue2));border-radius:2px}
.tli{position:relative;margin-bottom:13px;padding:11px 13px;background:var(--fog);border-radius:10px;border:1px solid var(--border)}
.tli::before{content:'';position:absolute;left:-17px;top:14px;width:10px;height:10px;border-radius:50%;background:var(--blue2);border:2px solid #fff;box-shadow:0 0 0 2px var(--blue2)}
.tltime{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--amber);font-weight:600;margin-bottom:3px}
.tltitle{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
.tlbody{font-size:12.5px;color:var(--sub);line-height:1.6}
/* Cases */
.cw{border:1px solid var(--border);border-radius:11px;overflow:hidden;margin-bottom:10px;transition:box-shadow .15s}
.cw:hover{box-shadow:0 4px 20px rgba(13,27,42,.12)}
.ch{display:flex;align-items:center;gap:9px;padding:11px 13px;background:var(--fog);cursor:pointer}
.cnum{width:25px;height:25px;border-radius:50%;background:var(--navy);color:var(--amber);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.ctitle{font-size:13px;font-weight:600;color:var(--text);flex:1}
.tbadge{font-size:11px;padding:2px 8px;border-radius:9px;font-weight:700;white-space:nowrap}
.tc{background:#EBF2FB;color:#1E5FAD}
.tp{background:#F3EAFB;color:#6B3FA0}
.tg{background:#E9F7EF;color:#1A7F4B}
.tn{background:#FDF3E7;color:#B55C00}
.cb{padding:13px;background:var(--card);border-top:1px solid var(--border)}
.clbl{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--hint);margin-bottom:4px}
/* Prompt editor */
.pw{border:2px solid var(--border);border-radius:11px;overflow:hidden;margin-bottom:12px;transition:border-color .15s}
.pw:focus-within{border-color:var(--blue2)}
.ph{display:flex;align-items:center;gap:8px;padding:9px 13px;background:var(--navy)}
.pname{font-size:12.5px;font-weight:700;color:#fff;flex:1}
.pwhen{font-size:12px;color:var(--sub);padding:7px 12px 6px;background:rgba(232,114,12,.05);border-bottom:1px solid var(--border)}
.pta{width:100%;min-height:155px;padding:11px;font-family:'IBM Plex Mono',monospace;font-size:12px;line-height:1.7;color:var(--text);background:var(--card);border:none;outline:none;resize:vertical}
.pf{display:flex;align-items:center;gap:6px;padding:7px 10px;background:var(--fog);border-top:1px solid var(--border)}
/* Buttons */
.btn{padding:6px 12px;border-radius:7px;border:none;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .13s;font-family:inherit;display:inline-flex;align-items:center;gap:5px}
.bp{background:var(--blue);color:#fff}
.bp:hover{background:var(--blue2)}
.ba{background:var(--amber);color:var(--navy)}
.ba:hover{background:var(--amber2)}
.bo{background:transparent;color:var(--sub);border:1.5px solid var(--border)}
.bo:hover{border-color:var(--blue2);color:var(--blue)}
.bg{background:transparent;color:var(--hint);padding:5px 8px}
.bg:hover{color:var(--blue)}
.bt{background:var(--teacher);color:#fff}
.bt:hover{background:var(--teacher2)}
.bdr{background:#C0392B;color:#fff}
.bdr:hover{background:#E74C3C}
.bsm{padding:5px 10px;font-size:12px}
/* Test */
.qw{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:15px;margin-bottom:10px}
.qw.ok{border-color:var(--green)}
.qw.no{border-color:var(--red)}
.qnum{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--amber);font-weight:600;margin-bottom:5px}
.qtext{font-size:13px;font-weight:500;color:var(--text);margin-bottom:11px;line-height:1.55}
.qopts{display:flex;flex-direction:column;gap:6px}
.qopt{display:flex;align-items:flex-start;gap:8px;padding:8px 11px;border-radius:8px;border:1.5px solid var(--border);cursor:pointer;font-size:13px;color:var(--sub);transition:all .12s;background:var(--fog);text-align:left;width:100%;font-family:inherit;line-height:1.5}
.qopt:hover:not([disabled]){border-color:var(--blue2);background:rgba(37,99,168,.05);color:var(--text)}
.qopt[disabled]{cursor:default}
.qopt.oc{border-color:var(--green);background:rgba(26,127,75,.07);color:var(--green)}
.qopt.ow{border-color:var(--red);background:rgba(192,57,43,.07);color:var(--red)}
.ql{width:18px;height:18px;border-radius:50%;background:var(--mist);color:var(--sub);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;margin-top:1px}
.qopt.oc .ql{background:var(--green);color:#fff}
.qopt.ow .ql{background:var(--red);color:#fff}
.qexp{margin-top:9px;padding:9px 11px;background:rgba(26,127,75,.06);border-radius:7px;border-left:3px solid var(--green);font-size:12px;color:var(--sub);line-height:1.6}
.pass{background:linear-gradient(135deg,var(--green),#2DA05F);border-radius:10px;padding:13px 16px;display:flex;align-items:center;gap:11px;margin-top:16px}
.fail{background:rgba(192,57,43,.07);border:1.5px solid rgba(192,57,43,.3);border-radius:10px;padding:13px 16px;display:flex;align-items:center;gap:11px;margin-top:16px}
/* Assignments */
.aw{border:1.5px solid var(--border);border-radius:11px;overflow:hidden;margin-bottom:11px}
.ah{padding:11px 13px;background:linear-gradient(90deg,var(--navy3),var(--navy2));display:flex;align-items:center;gap:10px}
.ab{padding:13px;background:var(--card)}
.cr{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;margin-bottom:5px;background:var(--fog);border:1px solid var(--border);cursor:pointer;transition:all .12s}
.cr:hover{border-color:var(--green)}
.cpts{width:25px;height:25px;border-radius:50%;background:var(--amber);color:var(--navy);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
/* Lock screen */
.lksc{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:360px;text-align:center;padding:32px 18px}
.lkico{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--navy2),var(--navy3));border:2px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:16px}
.lktitle{font-size:18px;font-weight:800;color:var(--text);margin-bottom:6px}
.lksub{font-size:13px;color:var(--sub);line-height:1.65;max-width:360px;margin:0 auto 20px}
.lksteps{display:flex;flex-direction:column;gap:6px;width:100%;max-width:340px;text-align:left}
.lkstep{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:8px;background:var(--fog);border:1px solid var(--border);font-size:12.5px;color:var(--sub)}
.lkstep.done{background:rgba(26,127,75,.06);border-color:rgba(26,127,75,.3);color:var(--green)}
/* Celebration modal */
.cov{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:rgba(13,27,42,.75);backdrop-filter:blur(6px)}
.cbox{background:var(--card);border-radius:16px;padding:34px;text-align:center;max-width:390px;width:90%;animation:pop .4s cubic-bezier(.34,1.56,.64,1) both;position:relative;overflow:hidden;border:2px solid var(--green);box-shadow:0 20px 60px rgba(0,0,0,.35)}
.confp{position:absolute;border-radius:2px;animation:fall 1.5s ease-in forwards}
/* Overview cards */
.ogrid{display:grid;grid-template-columns:repeat(2,1fr);gap:13px;margin-bottom:16px}
.mcard{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:19px;cursor:pointer;transition:all .17s;position:relative;overflow:hidden}
.mcard:hover{border-color:var(--blue2);box-shadow:0 4px 20px rgba(13,27,42,.12);transform:translateY(-2px)}
.mcard.lk{cursor:not-allowed;opacity:.55}
.mcard.lk:hover{transform:none;box-shadow:none;border-color:var(--border)}
.mcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.mcard.m1::before{background:linear-gradient(90deg,#2563A8,#4FA3D1)}
.mcard.m2::before{background:linear-gradient(90deg,#E8720C,#FDB97A)}
.mcard.m3::before{background:linear-gradient(90deg,#1A7F4B,#52C78A)}
.mcard.m4::before{background:linear-gradient(90deg,#6B3FA0,#A87DD6)}
.mcbgn{position:absolute;right:12px;top:8px;font-family:'Bebas Neue',sans-serif;font-size:50px;color:var(--fog);line-height:1}
/* Auth */
.auth{min-height:100vh;background:linear-gradient(135deg,var(--navy) 0%,#1B2A4A 50%,#2A1B5C 100%);display:flex;align-items:center;justify-content:center;padding:20px}
.abox{background:var(--card);border-radius:16px;padding:30px;max-width:390px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.35);animation:pop .35s ease both}
.ainp{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;outline:none;font-family:inherit;transition:border-color .13s;box-sizing:border-box}
.ainp:focus{border-color:var(--blue2)}
.ainp.err{border-color:var(--red)}
/* Outcomes */
.og{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:9px;margin-bottom:6px}
.oi{display:flex;align-items:flex-start;gap:8px;background:var(--fog);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.onum{width:21px;height:21px;border-radius:50%;background:var(--amber);color:var(--navy);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;margin-top:1px}
/* Teacher */
.tbadge2{background:linear-gradient(135deg,var(--teacher),var(--teacher2));color:#fff;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;letter-spacing:.5px;display:inline-block}
.tsec{background:rgba(123,63,160,.05);border:1.5px solid rgba(123,63,160,.2);border-radius:11px;padding:13px;margin-bottom:13px}
.tst{font-size:11.5px;font-weight:700;color:var(--teacher);letter-spacing:1px;text-transform:uppercase;margin-bottom:9px}
.einp{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;color:var(--text);background:var(--card);outline:none;font-family:inherit;transition:border-color .13s;margin-bottom:5px;box-sizing:border-box}
.einp:focus{border-color:var(--teacher)}
.eta{width:100%;padding:9px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;color:var(--text);background:var(--card);outline:none;font-family:inherit;resize:vertical;min-height:75px;transition:border-color .13s;margin-bottom:5px;line-height:1.6;box-sizing:border-box}
.eta:focus{border-color:var(--teacher)}
/* Users table */
.utable{width:100%;border-collapse:collapse;font-size:13px}
.utable th{padding:8px 10px;text-align:left;background:var(--fog);border-bottom:2px solid var(--border);font-weight:700;color:var(--sub);font-size:11px;letter-spacing:.5px;white-space:nowrap}
.utable td{padding:9px 10px;border-bottom:1px solid var(--border)}
.utable tr:hover td{background:rgba(123,63,160,.04)}
/* Utils */
.chip{font-size:11px;font-weight:600;padding:2px 8px;border-radius:9px}
.cb1{background:#EBF2FB;color:#1E5FAD}
.cb2{background:#FDF3E7;color:#B55C00}
.cb3{background:#E9F7EF;color:#1A7F4B}
.cb4{background:#F3EAFB;color:#6B3FA0}
.ccdone{background:linear-gradient(135deg,#1B3252,#0D2A1B);border:2px solid var(--green);border-radius:14px;padding:24px;text-align:center;margin-bottom:16px;position:relative;overflow:hidden}
.ccdone::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(26,127,75,.2) 0%,transparent 65%)}
.pbarh{height:5px;background:var(--mist);border-radius:3px;overflow:hidden}
.pbarfill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1);background:linear-gradient(90deg,var(--blue),var(--amber))}
@media(max-width:800px){.ogrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"></div>
<script>
const TOOLS={
  claude:{name:'Claude.ai',cls:'tool-claude',dot:'#2563A8'},
  perplexity:{name:'Perplexity AI',cls:'tool-perplexity',dot:'#6B3FA0'},
  gemini:{name:'Gemini',cls:'tool-gemini',dot:'#1A7F4B'},
  notebook:{name:'NotebookLM',cls:'tool-notebook',dot:'#B55C00'},
  combo:{name:'Claude.ai + Perplexity AI',cls:'tool-combo',dot:'#2563A8'},
};

const MODULES=[
{
  id:'m1',num:1,colorClass:'m1',
  title:'Первый контакт',
  subtitle:'Промт-инжиниринг для ПТО',
  goal:'Дать рабочее понимание принципов промт-инжиниринга и практические навыки применения Claude.ai и Perplexity AI для ежедневных задач ПТО.',
  duration:'2 часа',
  tools:['claude','perplexity'],
  outcomes:[
    'Понимает, чем нейросети полезны именно для ПТО, и может объяснить коллегам',
    'Умеет формулировать промт по структуре: Роль → Контекст → Задача → Формат → Ограничения',
    'Отличает «слабый» промт от «сильного» и самостоятельно его улучшает',
    'Получает черновик делового письма за 3–5 минут через Claude.ai',
    'Проверяет актуальность ГОСТ/СП через Perplexity AI',
    'Знает и применяет защиту от галлюцинаций нейросетей',
    'Имеет личный набор из 5–7 промт-шаблонов под задачи своего ПТО',
  ],
  plan:[

// ─── AUTH SCREEN ──────────────────────────────────────────────
function AuthScreen({onLogin}){
  const [mode,setMode]=useState('login');
  const [name,setName]=useState('');
  const [pwd,setPwd]=useState('');
  const [err,setErr]=useState('');

  function submit(){
    var n=name.trim();
    if(!n){setErr('Введите имя пользователя');return;}
    var users=LS.get(USERS_KEY,{});
    if(mode==='register'){
      if(users[n]){setErr('Такой пользователь уже существует');return;}
      users[n]={name:n,progress:{m1:false,m2:false,m3:false,m4:false},created:new Date().toISOString(),active:new Date().toISOString()};
      LS.set(USERS_KEY,users);
      LS.set(SESSION_KEY,{username:n,isTeacher:false});
      onLogin({username:n,isTeacher:false});
    } else {
      if(pwd===TEACHER_PWD){
        LS.set(SESSION_KEY,{username:n||'Преподаватель',isTeacher:true});
        onLogin({username:n||'Преподаватель',isTeacher:true});
        return;
      }
      if(!users[n]){setErr('Пользователь не найден — зарегистрируйтесь');return;}
      users[n].active=new Date().toISOString();
      LS.set(USERS_KEY,users);
      LS.set(SESSION_KEY,{username:n,isTeacher:false});
      onLogin({username:n,isTeacher:false});
    }
  }

  function tabStyle(m){return {flex:1,padding:'8px',border:'none',cursor:'pointer',borderRadius:7,background:mode===m?'var(--card)':'transparent',color:mode===m?'var(--text)':'var(--hint)',fontWeight:mode===m?700:500,fontSize:13.5,boxShadow:mode===m?'0 2px 8px rgba(0,0,0,.1)':'none',fontFamily:'inherit',transition:'all .13s'};}

  return h('div',{className:'auth'},

        h('div',{style:{fontSize:14,color:'var(--silver)',marginTop:5}},'Нейросети для инженера строительства')
      ),
      h('div',{className:'abox'},
        h('div',{style:{display:'flex',background:'var(--fog)',borderRadius:10,padding:4,marginBottom:20}},
          h('button',{onClick:function(){setMode('login');setErr('');},style:tabStyle('login')},'Войти'),
          h('button',{onClick:function(){setMode('register');setErr('');},style:tabStyle('register')},'Регистрация')
        ),
        h('p',{style:{fontSize:13,color:'var(--sub)',marginBottom:14,lineHeight:1.55}},
          mode==='login'?'Введите своё имя для входа. Для преподавателя — имя и пароль.':'Введите имя — оно сохранит ваш прогресс в курсе.'
        ),
        h('label',{style:{fontSize:12,fontWeight:600,color:'var(--sub)',display:'block',marginBottom:4}},mode==='login'?'Имя пользователя':'Ваше имя'),
        h('input',{className:'ainp'+(err?' err':''),value:name,autoFocus:true,placeholder:mode==='login'?'Иванов Иван':'Например: Петров А.В.',
          onChange:function(e){setName(e.target.value);setErr('');},

        mode==='login'&&frag(

// ─── TEST SECTION ─────────────────────────────────────────────
function TestSection({questions,alreadyPassed,onPass,teacherMode}){
  const [answers,setAnswers]=useState({});
  const [submitted,setSubmitted]=useState(false);
  var pass=Math.ceil(questions.length*.75);

  function pick(qi,oi){
    if(answers[qi]!==undefined)return;
    var next=Object.assign({},answers);next[qi]=oi;
    setAnswers(next);
    if(Object.keys(next).length===questions.length&&!submitted){
      setSubmitted(true);
      var correct=Object.keys(next).filter(function(i){return questions[+i].correct===next[i];}).length;
      if(correct>=pass&&!alreadyPassed&&onPass)onPass();
    }
  }

  var answered=Object.keys(answers).length;
  var correct=Object.keys(answers).filter(function(i){return questions[+i].correct===answers[i];}).length;
  var allAns=answered===questions.length;
  var passed=correct>=pass;

  function reset(){setAnswers({});setSubmitted(false);}

  return h('div',null,
    alreadyPassed&&!allAns&&h('div',{className:'pass',style:{marginTop:0,marginBottom:14}},
      h('span',{style:{fontSize:24}},'✅'),
      h('div',{style:{flex:1}},h('div',{style:{fontSize:14,fontWeight:700,color:'#fff'}},'Тест уже сдан'),h('div',{style:{fontSize:12.5,color:'rgba(255,255,255,.8)'}},'Можно пройти снова для практики')),
      h('button',{className:'btn bsm',style:{background:'rgba(255,255,255,.15)',color:'#fff',border:'1px solid rgba(255,255,255,.2)'},onClick:reset},'Пройти снова')
    ),
    h('div',{style:{display:'flex',alignItems:'center',gap:12,marginBottom:13,flexWrap:'wrap'}},
      h('span',{style:{fontSize:13,color:'var(--sub)'}},h('strong',null,answered),'/',questions.length,' ответов | Проходной: ',h('strong',null,pass),'/',questions.length),
      allAns&&h('span',{style:{background:passed?'var(--green)':'var(--red)',color:'#fff',padding:'3px 11px',borderRadius:12,fontSize:12.5,fontWeight:700}},correct,'/',questions.length,' ',passed?'✓ Зачёт':'✗ Не зачёт'),
      (allAns||teacherMode)&&h('button',{className:'btn bo bsm',style:{marginLeft:'auto'},onClick:reset},'↺ Сбросить')
    ),
    ...questions.map(function(q,qi){
      var picked=answers[qi];
      var isAns=picked!==undefined;
      return h('div',{key:qi,className:'qw'+(isAns?(picked===q.correct?' ok':' no'):'')},
        h('div',{className:'qnum'},'Вопрос ',qi+1,' из ',questions.length),
        h('div',{className:'qtext'},q.q),
        h('div',{className:'qopts'},
          ...q.opts.map(function(opt,oi){
            var cls='qopt';
            if(isAns){if(oi===q.correct)cls+=' oc';else if(oi===picked)cls+=' ow';}
            return h('button',{key:oi,className:cls,disabled:isAns||undefined,onClick:function(){pick(qi,oi);}},
              h('span',{className:'ql'},String.fromCharCode(65+oi)),opt
            );
          })
        ),
        isAns&&h('div',{className:'qexp fade'},h('strong',null,picked===q.correct?'✓ Верно!':'✗ Неверно.'),' ',q.explain)
      );
    }),
    allAns&&(passed
      ?h('div',{className:'pass'},h('span',{style:{fontSize:26}},'🎉'),h('div',null,h('div',{style:{fontSize:14,fontWeight:700,color:'#fff'}},'Тест сдан! ',correct,'/',questions.length),h('div',{style:{fontSize:12.5,color:'rgba(255,255,255,.85)'}},'Следующий раздел открыт.')))
      :h('div',{className:'fail'},h('span',{style:{fontSize:24}},'📖'),h('div',{style:{flex:1}},h('div',{style:{fontSize:13,fontWeight:700,color:'var(--red)'}},'Нужно ',pass,'+, набрано ',correct),h('div',{style:{fontSize:12.5,color:'var(--sub)'}},'Изучите материал и попробуйте снова.')),h('button',{className:'btn bo bsm',onClick:reset},'Ещё раз'))
    )
  );
}

    all.length===0

      :h('div',{className:'card'},
        h('div',{style:{overflowX:'auto'}},
          h('table',{className:'utable'},
            h('thead',null,h('tr',null,...['Слушатель','М1','М2','М3','М4','Прогресс','Активность',''].map(function(hd){return h('th',{key:hd},hd);}))),
            h('tbody',null,...all.map(function(u){
              var p=u.progress||{};
              var dn=[p.m1,p.m2,p.m3,p.m4].filter(Boolean).length;
              return h('tr',{key:u.name},
                h('td',null,h('div',{style:{display:'flex',alignItems:'center',gap:7}},h('div',{style:{width:25,height:25,borderRadius:'50%',background:'var(--navy)',color:'var(--amber)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,flexShrink:0}},u.name.slice(0,2).toUpperCase()),h('span',{style:{fontWeight:600,color:'var(--text)'}},u.name))),
                ...(['m1','m2','m3','m4'].map(function(m){return h('td',{key:m,style:{textAlign:'center'}},p[m]?'✅':'○');})),
                h('td',null,h('div',{style:{display:'flex',alignItems:'center',gap:7}},h('div',{style:{flex:1,height:5,background:'var(--mist)',borderRadius:3,overflow:'hidden'}},h('div',{style:{height:'100%',width:(dn/4*100)+'%',background:'linear-gradient(90deg,var(--blue),var(--amber))',borderRadius:3}})),h('span',{style:{fontSize:12,fontWeight:700,color:'var(--sub)',whiteSpace:'nowrap'}},dn,'/4'))),
                h('td',{style:{fontSize:12,color:'var(--hint)',whiteSpace:'nowrap'}},u.active?new Date(u.active).toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'2-digit'}):'—'),
                h('td',null,h('div',{style:{display:'flex',gap:4}},h('button',{className:'btn bo bsm',onClick:function(){resetP(u.name);}},'↺'),h('button',{className:'btn bdr bsm',onClick:function(){del(u.name);}},'✕')))
              );
            }))
          )
        )
      )
  );
}

// ─── TEACHER DASHBOARD ────────────────────────────────────────
function TeacherDashboard({completed,custom,onResetCustom,notify}){
  return h('div',{className:'fade'},
    h('div',{style:{background:'linear-gradient(135deg,var(--teacher),#4A1B70)',borderRadius:14,padding:22,marginBottom:15}},h('div',{style:{fontSize:28,marginBottom:6}},'⚙️'),h('h1',{style:{fontSize:17,fontWeight:800,color:'#fff',marginBottom:4}},'Настройки курса'),h('p',{style:{color:'rgba(255,255,255,.75)',fontSize:13}},'Управление контентом и настройками.')),
    h('div',{className:'card',style:{marginBottom:13}},
      h('div',{style:{fontSize:13.5,fontWeight:700,marginBottom:11,color:'var(--teacher)'}},'📊 Состояние модулей'),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9}},
        ...MODULES.map(function(m){return h('div',{key:m.id,style:{padding:11,borderRadius:10,background:'var(--fog)',border:'1.5px solid '+(completed[m.id]?'var(--green)':'var(--border)'),display:'flex',alignItems:'center',gap:8}},h('span',{style:{fontSize:17}},completed[m.id]?'✅':'○'),h('div',null,h('div',{style:{fontSize:13,fontWeight:700,color:'var(--text)'}},'М',m.num,': ',m.title),h('div',{style:{fontSize:12,color:completed[m.id]?'var(--green)':'var(--hint)'}},completed[m.id]?'Сдан':'Не пройден')));})
      )
    ),
    h('div',{className:'card'},
      h('div',{style:{fontSize:13.5,fontWeight:700,marginBottom:11,color:'var(--teacher)'}},'⚙️ Управление'),
      h('div',{style:{padding:12,borderRadius:10,background:'var(--fog)',border:'1px solid var(--border)'}},
        h('div',{style:{fontSize:13,fontWeight:700,color:'var(--text)',marginBottom:4}},'Сбросить правки содержания'),
        h('div',{style:{fontSize:12.5,color:'var(--sub)',marginBottom:8}},'Возвращает все отредактированные тексты и промты к исходным.'),
        h('button',{className:'btn bo bsm',onClick:function(){if(window.confirm('Сбросить все правки?'))onResetCustom();}},'↺ Сбросить правки')
      )
    )
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────
function App(){
  const [session,setSession]=useState(function(){return LS.get(SESSION_KEY,null);});
  if(!session)return h(AuthScreen,{onLogin:function(s){setSession(s);}});
  return h(CourseApp,{session:session,onLogout:function(){LS.set(SESSION_KEY,null);setSession(null);}});
}

function CourseApp({session,onLogout}){
  var isTeacher=session.isTeacher||false;
  var username=session.username||'';

  const [page,setPage]=useState('overview');
  const [msg,setMsg]=useState('');
  const [msgT,setMsgT]=useState(false);
  const [sidebar,setSidebar]=useState(true);
  const [completed,setCompleted]=useState(function(){
    if(isTeacher)return {m1:true,m2:true,m3:true,m4:true};
    var users=LS.get(USERS_KEY,{});
    return (users[username]&&users[username].progress)||{m1:false,m2:false,m3:false,m4:false};
  });
  const [custom,setCustom]=useState(function(){return LS.get(CUSTOM_KEY,{});});

  var allDone=completed.m1&&completed.m2&&completed.m3&&completed.m4;

  function notify(text,t){setMsg(text);setMsgT(!!t);setTimeout(function(){setMsg('');setMsgT(false);},2400);}

  function completeModule(modId){
    if(isTeacher)return;
    var next=Object.assign({},completed);next[modId]=true;
    setCompleted(next);
    var users=LS.get(USERS_KEY,{});
    if(users[username]){users[username].progress=next;users[username].active=new Date().toISOString();LS.set(USERS_KEY,users);}
  }

  function saveCustomModule(modId,data){
    var next=Object.assign({},custom);next[modId]=Object.assign({},custom[modId]||{},data);
    setCustom(next);LS.set(CUSTOM_KEY,next);
  }
  function saveCustomPrompt(modId,promptId,text){
    var ex=(custom[modId]&&custom[modId].prompts)||[];
    var upd=ex.find(function(p){return p.id===promptId;})?ex.map(function(p){return p.id===promptId?Object.assign({},p,{text:text}):p;}):[].concat(ex,[{id:promptId,text:text}]);
    var next=Object.assign({},custom);next[modId]=Object.assign({},custom[modId]||{},{prompts:upd});
    setCustom(next);LS.set(CUSTOM_KEY,next);
  }
  function resetCustom(){setCustom({});LS.set(CUSTOM_KEY,{});notify('↺ Правки сброшены',true);}

  function isModLocked(id){if(isTeacher)return false;var i=MODULES.findIndex(function(m){return m.id===id;});return i>0&&!completed[MODULES[i-1].id];}
  var promptsLocked=!isTeacher&&!allDone;
  var examLocked=!isTeacher&&!allDone;

  function navigate(id){
    if(!isTeacher){
      var m=MODULES.find(function(m){return m.id===id;});
      if(m&&isModLocked(m.id)){notify('🔒 Завершите предыдущий модуль');return;}
      if(id==='prompts'&&promptsLocked){notify('🔒 Пройдите все 4 модуля');return;}
      if(id==='exam'&&examLocked){notify('🔒 Пройдите все 4 модуля');return;}
    }
    setPage(id);
  }

  var done=Object.values(completed).filter(Boolean).length;

  var navItems=[{id:'overview',label:'Обзор курса',icon:'🏠'}].concat(
    MODULES.map(function(m,i){return {id:m.id,label:'М'+m.num+': '+m.title,icon:'M'+m.num,locked:isModLocked(m.id),done:completed[m.id]};}),
    [{id:'prompts',label:'Банк промтов',icon:'⚡',locked:promptsLocked},{id:'exam',label:'Мини-зачёт',icon:'🏆',locked:examLocked}],
    isTeacher?[{id:'users',label:'Слушатели',icon:'👥',tt:true},{id:'teacher',label:'Настройки',icon:'⚙️',tt:true}]:[]
  );

  var topTabs=[{id:'overview',label:'🏠'}].concat(
    MODULES.map(function(m,i){return {id:m.id,label:'М'+m.num,locked:isModLocked(m.id)};}),
    [{id:'prompts',label:'⚡ Промты',locked:promptsLocked},{id:'exam',label:'🏆 Зачёт',locked:examLocked}],
    isTeacher?[{id:'users',label:'👥 Слушатели'},{id:'teacher',label:'⚙️ Настройки'}]:[]
  );

  function renderContent(){
    if(page==='overview')return h(OverviewPage,{completed:completed,allDone:allDone,navigate:navigate,teacherMode:isTeacher,username:username});
    if(page==='users'&&isTeacher)return h(UsersView,null);
    if(page==='teacher'&&isTeacher)return h(TeacherDashboard,{completed:completed,custom:custom,onResetCustom:resetCustom,notify:notify});
    if(page==='prompts')return h(PromptsPage,{locked:promptsLocked,completed:completed,teacherMode:isTeacher,custom:custom,onSavePrompt:saveCustomPrompt,notify:notify});
    if(page==='exam')return h(ExamPage,{locked:examLocked,completed:completed,teacherMode:isTeacher});
    var mi=MODULES.findIndex(function(m){return m.id===page;});
    if(mi>=0){var mod=MODULES[mi];return h(ModuleView,{mod:mod,completed:completed[mod.id],onComplete:completeModule,isLocked:isModLocked(mod.id),nextMod:MODULES[mi+1]||null,teacherMode:isTeacher,custom:custom,onSaveCustom:saveCustomModule,onSavePrompt:saveCustomPrompt,notify:notify});}
    return h(OverviewPage,{completed:completed,allDone:allDone,navigate:navigate,teacherMode:isTeacher,username:username});
  }

  return h('div',{style:{height:'100%',display:'flex',flexDirection:'column'}},
    h(Notif,{msg:msg,teacher:msgT}),
    h('div',{className:'bar'+(isTeacher?' t':'')},
      h('div',{className:'logo'+(isTeacher?' t':'')},'ИИ',h('span',null,'в'),'ПТО'),
      h('div',{className:'vsep'}),
      h('div',{className:'tabs'},
        ...topTabs.map(function(t){return h('button',{key:t.id,className:'tab'+(page===t.id?' on'+(isTeacher?' t':''):'')+(t.locked?' off':''),title:t.locked?'Заблокировано':'',onClick:function(){navigate(t.id);}},t.label,t.locked?' 🔒':'');})
      ),
      h('div',{className:'rbar'},
        h('div',{className:'pill'},h('div',{className:'dot',style:{background:isTeacher?'var(--teacher2)':allDone?'var(--green)':'var(--amber)'}}),(isTeacher?'Препод.':username.split(' ')[0]).slice(0,10)),
        !isTeacher&&h('div',{className:'pill',style:{color:'var(--amber)'}},done,'/4'),
        h('button',{className:'ibtn',title:'Печать',onClick:function(){window.print();}},'🖨'),
        h('button',{className:'ibtn',title:'Выйти',onClick:onLogout,style:{fontSize:13}},'🚪'),
        h('button',{className:'ibtn',onClick:function(){setSidebar(!sidebar);}},'☰')
      )
    ),
    h('div',{className:'main'},
      sidebar&&h('div',{className:'side'+(isTeacher?' t':'')},
        h('div',{style:{padding:'9px 7px 5px'}},
          h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--silver)',marginBottom:4}},
            h('span',null,isTeacher?'Преподаватель':(username.length>14?username.slice(0,13)+'…':username)),
            h('span',{style:{fontWeight:700,color:isTeacher?'var(--teacher2)':'var(--amber)'}},isTeacher?'Полный':(done+'/4'))
          ),
          h('div',{className:'pbar'},h('div',{className:'pfill'+(isTeacher?' t':''),style:{width:(isTeacher?100:done/4*100)+'%'}}))
        ),
        h('div',{className:'ssep'}),
        ...navItems.map(function(item){
          return h('button',{key:item.id,className:'sitem'+(page===item.id?(item.tt?' ton':' on'):'')+(item.locked?' lk':''),onClick:function(){navigate(item.id);}},
            h('span',{style:{fontSize:12,fontWeight:700,color:item.done?'var(--green)':page===item.id?'var(--amber)':'var(--hint)',width:18,textAlign:'center',flexShrink:0}},item.icon),
            h('span',{style:{flex:1,fontSize:12.5}},item.label),
            item.locked&&h('span',{style:{fontSize:10,opacity:.5}},'🔒'),
            item.done&&!item.locked&&h('span',{style:{fontSize:11,color:'var(--green)'}},'✅')
          );
        }),
        h('div',{className:'ssep'}),
        ...Object.entries(TOOLS).slice(0,4).map(function(entry){var k=entry[0],v=entry[1];return h('div',{key:k,className:'sitem',style:{cursor:'default'}},h('div',{style:{width:7,height:7,borderRadius:'50%',background:v.dot,flexShrink:0}}),h('span',{style:{fontSize:12}},v.name));}),
        h('div',{className:'ssep'}),
        h('div',{style:{padding:'6px 5px'}},
          h('div',{style:{background:'rgba(232,114,12,.1)',borderRadius:9,padding:9,border:'1px solid rgba(232,114,12,.2)'}},
            h('div',{style:{fontSize:10,fontWeight:700,color:'var(--amber)',marginBottom:4}},'⚠ ПРИНЦИП «4 ГЛАЗА»'),
            h('div',{style:{fontSize:11,color:'var(--silver)',lineHeight:1.5}},'AI-документ проверяют минимум два специалиста перед подписанием.')
          )
        )
      ),
      h('div',{className:'content'},renderContent())
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));

</script>
</body>
</html>
